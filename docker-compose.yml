services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lilmod_ulilamed
      POSTGRES_USER: lilmod
      POSTGRES_PASSWORD: lilmod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lilmod -d lilmod_ulilamed"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgres://lilmod:lilmod@db:5432/lilmod_ulilamed
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
